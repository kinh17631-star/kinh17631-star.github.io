<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Commands - MyToolHub</title>
    <script src="https://pl28842396.effectivegatecpm.com/78/66/06/7866062a1a9ed246b50285d5b3aeeff3.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background-color: #0d1117; color: #c9d1d9; padding: 20px; }
        .step-box { background: #161b22; border: 1px solid #30363d; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        code { background: #000; color: #39ff14; padding: 10px; display: block; border-radius: 4px; margin-bottom: 10px; }
        .btn { background: #238636; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div style="max-width: 600px; margin: auto;">
        <h2 style="text-align: center; color: #58a6ff;">Part 4: IP-Tracer Setup</h2>
        
        <div class="step-box">
            <code id="s1">pkg install python -y</code>
            <button class="btn" onclick="copyIt('#s1')">Copy Step 1</button>
        </div>

        <div class="step-box">
            <code id="s2">git clone https://github.com/kinh17631-star/MyToolHub</code>
            <button class="btn" onclick="copyIt('#s2')">Copy Step 2</button>
        </div>

        <div class="step-box">
            <code id="s3">cd MyToolHub/IP-Tracer</code>
            <button class="btn" onclick="copyIt('#s3')">Copy Step 3</button>
        </div>

        <div class="step-box">
            <code id="s4">python3 install.py && python3 main.py</code>
            <button class="btn" onclick="copyIt('#s4')">Copy Step 4</button>
        </div>
    </div>
    <script>
        function copyIt(id) {
            var t = document.querySelector(id).innerText;
            navigator.clipboard.writeText(t).then(function() { alert("Command Copied!"); });
        }
    </script>
</body>
</html>
