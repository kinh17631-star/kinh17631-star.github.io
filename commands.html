<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Installation Commands</title>
    <style>
        body { background: #0f172a; color: white; font-family: monospace; padding: 20px; }
        .code-box { background: #000; padding: 20px; border-radius: 10px; border-left: 5px solid #38bdf8; text-align: left; position: relative; }
        .copy-btn { background: #38bdf8; color: #000; border: none; padding: 10px 20px; border-radius: 5px; margin-top: 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Terminal Commands</h2>
    <div class="code-box" id="c">
        pkg update && pkg upgrade -y<br>
        pkg install git -y<br>
        git clone https://github.com/kinh17631-star/MyToolHub<br>
        cd MyToolHub/phoneinfo<br>
        bash phoneinfo.sh
    </div>
    <button class="copy-btn" onclick="copy()">COPY COMMANDS</button>

    <script>
        function copy() {
            let t = "pkg update && pkg upgrade -y && pkg install git -y && git clone https://github.com/kinh17631-star/MyToolHub && cd MyToolHub/phoneinfo && bash phoneinfo.sh";
            navigator.clipboard.writeText(t);
            alert("Copied! Paste in iSH/Termux.");
        }
    </script>
</body>
</html>
