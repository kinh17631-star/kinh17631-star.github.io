    <script>
        // 1. Scroll Background Gradient Logic
        window.addEventListener('scroll', () => {
            let scrollY = window.scrollY;
            let maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            let scrollPercent = (scrollY / maxScroll) * 100;
            document.body.style.backgroundPosition = `50% ${scrollPercent}%`;
        });

        // 2. Super Fast Scroll Typing Logic
        document.addEventListener("DOMContentLoaded", function() {
            // Original Text Data (We store it here so it's clean and safe to type)
            const textData = [
                "Welcome to MyToolHub - The Ultimate Destination for Advanced Terminal Scripts & Security Tools.",
                "Featured Scripts",
                "Phone-Cloner", "Advanced cloning utility optimized for Termux & iSH environments.",
                "Pass-Brute", "Educational password security testing tool with dictionary support.",
                "IP-Tracer", "Accurate network mapping and packet tracing utility.",
                "Why MyToolHub?",
                "Cross-Platform Support", "Scripts fully tested and optimized for both Android (Termux) and iOS (iSH Shell).",
                "Open Source Base", "Transparent code hosted securely. Learn, modify, and deploy with ease.",
                "Terminal Knowledge Hub",
                "0x01: Mobile Shell Mastery", "Unlock the true potential of your smartphone. Termux and iSH offer a full Linux environment, allowing you to run powerful terminal tools, analyze networks, and manage repositories directly from your mobile device without rooting or jailbreaking.",
                "0x02: Automated Ethical Hacking", "Efficiency is key in cybersecurity. Modern security auditing relies heavily on automation scripts written in Python and Bash. Learn to deploy pre-configured payloads and automate reconnaissance phases for authorized penetration testing.",
                "0x03: Deep Network Auditing", "Understand how data flows across the web. Network security audits involve tracing packets, analyzing open ports, and identifying vulnerabilities within a network infrastructure. Tools like IP-Tracer provide vital data for network researchers.",
                "0x04: Cryptography & Brute-Force", "Testing the strength of passwords is a fundamental aspect of digital security. Educational brute-force scripts demonstrate how easily weak passwords can be compromised using dictionary attacks, emphasizing the need for robust cryptographic practices."
            ];

            const typingSpeed = 10; // 10ms (super fast)
            const elements = document.querySelectorAll('.type-target');
            
            // Assign text to elements
            elements.forEach((el, index) => {
                if(textData[index]) {
                    el.setAttribute('data-text', textData[index]);
                }
            });

            // Intersection Observer to trigger typing when scrolled into view
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting && !entry.target.classList.contains('typed')) {
                        entry.target.classList.add('typed');
                        entry.target.classList.add('typing-cursor'); // Add blinking cursor
                        let originalText = entry.target.getAttribute('data-text');
                        if(originalText) {
                            typeFast(entry.target, originalText, 0);
                        }
                    }
                });
            }, { threshold: 0.1 });

            // Start observing
            elements.forEach(el => observer.observe(el));

            // Typing Function
            function typeFast(element, text, index) {
                if (index < text.length) {
                    element.innerHTML += text.charAt(index);
                    setTimeout(() => typeFast(element, text, index + 1), typingSpeed);
                } else {
                    // Remove cursor when done typing
                    setTimeout(() => { element.classList.remove('typing-cursor'); }, 500);
                }
            }
        });
    </script>
