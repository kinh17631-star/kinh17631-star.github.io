<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarif Saifi | Official Portfolio</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #2f81f7; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        html { scroll-behavior: smooth; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .avatar { width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--accent); margin-bottom: 20px; box-shadow: 0 0 30px rgba(47, 129, 247, 0.2); }
        .name { font-size: 3rem; color: white; margin: 0; font-weight: 800; }
        .container { max-width: 900px; margin: auto; padding: 80px 20px; }
        .tool-card { background: var(--card); border: 1px solid #30363d; border-radius: 16px; padding: 30px; margin-top: 30px; display: flex; align-items: center; justify-content: space-between; }
        .btn-launch { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; transition: 0.3s; }
        .btn-launch:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(47, 129, 247, 0.4); }
    </style>
</head>
<body>
    <div class="hero">
        <img src="https://github.com/kinh17631-star.png" class="avatar" data-aos="zoom-in">
        <h1 class="name" data-aos="fade-up">Aarif Saifi</h1>
        <p style="color: #8b949e; font-size: 1.2rem;" data-aos="fade-up" data-aos-delay="200">Full Stack Developer | Cybersecurity Enthusiast</p>
    </div>

    <div class="container">
        <h2 style="text-align:center; color:white;" data-aos="fade-right">My Official Tools</h2>
        <div class="tool-card" data-aos="fade-left">
            <div style="text-align: left;">
                <h3 style="color:white; margin:0;">PhoneInfo Pro v2.0</h3>
                <p style="color:#8b949e; margin: 10px 0;">Professional-grade system and network auditing tool.</p>
            </div>
            <a href="verify.html" class="btn-launch">Get Commands</a>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 1000, once: true });</script>
</body>
</html>
