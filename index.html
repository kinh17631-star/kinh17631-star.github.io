<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarif Saifi | Official Portfolio</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #2f81f7; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; text-align: center; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .avatar { width: 140px; border-radius: 50%; border: 3px solid var(--accent); margin-bottom: 20px; }
        .container { max-width: 900px; margin: auto; padding: 40px 20px; }
        .tool-card { background: var(--card); border: 1px solid #30363d; border-radius: 16px; padding: 30px; display: flex; align-items: center; justify-content: space-between; }
        .btn-launch { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>

    <div class="hero">
        <img src="https://github.com/kinh17631-star.png" class="avatar" data-aos="zoom-in">
        <h1 data-aos="fade-up">Aarif Saifi</h1>
        <p data-aos="fade-up" data-aos-delay="200">Full Stack Developer | Security Researcher</p>
    </div>

    <div class="container">
        <div class="tool-card" data-aos="fade-left">
            <div style="text-align: left;">
                <h3 style="color:white; margin:0;">PhoneInfo Pro v2.0</h3>
                <p style="color:#8b949e;">Advanced System Auditor.</p>
            </div>
            <a href="verify.html" class="btn-launch">Get Commands</a>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 1000, once: true });</script>

    <script src="https://pl28842396.effectivegatecpm.com/78/66/06/7866062a1a9ed246b50285d5b3aeeff3.js"></script>
</body>
</html>
