<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Verification</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; text-align: center; padding-top: 80px; }
        #timer { font-size: 100px; color: #2f81f7; font-weight: bold; margin: 40px 0; }
        .btn-next { display: none; background: #238636; color: white; padding: 15px 45px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 1.1rem; }
        .ad-space { width: 300px; height: 250px; background: #161b22; border: 1px dashed #30363d; margin: 20px auto; display: flex; align-items: center; justify-content: center; color: #484f58; }
    </style>
</head>
<body>
    <h3>Verifying Security... Please Wait</h3>
    <div class="ad-space">AD SLOT 1</div>
    <div id="timer">10</div>
    <a href="commands.html" id="btn-next" class="btn-next">Access Commands</a>
    <div class="ad-space" style="margin-top: 40px;">AD SLOT 2</div>

    <script>
        let t = 10;
        let x = setInterval(() => {
            t--; document.getElementById('timer').innerText = t;
            if(t <= 0) { 
                clearInterval(x); 
                document.getElementById('timer').style.display = 'none'; 
                document.getElementById('btn-next').style.display = 'inline-block'; 
            }
        }, 1000);
    </script>
</body>
</html>
