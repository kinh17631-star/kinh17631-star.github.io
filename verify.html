<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify - MyToolHub</title>
    <script src="https://pl28842396.effectivegatecpm.com/78/66/06/7866062a1a9ed246b50285d5b3aeeff3.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background-color: #0d1117; color: #c9d1d9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .box { border: 1px solid #30363d; padding: 40px; border-radius: 10px; background: #161b22; width: 80%; max-width: 400px; }
        #timer { font-size: 40px; color: #f0883e; font-weight: bold; margin: 20px 0; }
        .btn { background-color: #238636; color: white; padding: 12px 24px; text-decoration: none; border-radius: 5px; font-weight: bold; display: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Verification</h2>
        <p>Please wait while we verify your session...</p>
        <div id="timer">10</div>
        <a href="commands.html" id="continueBtn" class="btn">Continue to Commands</a>
    </div>

    <script>
        let seconds = 10;
        const timerEl = document.getElementById('timer');
        const btnEl = document.getElementById('continueBtn');

        const countdown = setInterval(() => {
            seconds--;
            timerEl.innerText = seconds;
            if (seconds <= 0) {
                clearInterval(countdown);
                timerEl.style.display = 'none';
                btnEl.style.display = 'inline-block';
            }
        }, 1000);
    </script>
</body>
</html>
