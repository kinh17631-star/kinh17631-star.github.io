<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Securing Connection...</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .loader { border: 4px solid #1e293b; border-top: 4px solid #38bdf8; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #timer { font-size: 60px; color: #38bdf8; margin: 30px; font-weight: bold; }
        .ad-slot { width: 300px; height: 250px; background: rgba(255,255,255,0.05); margin: 20px auto; border: 1px dashed #334155; display: flex; align-items: center; justify-content: center; color: #475569; }
        .btn-final { display: none; background: #10b981; color: white; padding: 15px 40px; border-radius: 10px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2>Generating Secure Link</h2>
    <div class="ad-slot">ADVERTISEMENT SLOT #1</div>
    <div id="timer">10</div>
    <div class="ad-slot">ADVERTISEMENT SLOT #2</div>
    <a href="commands.html" id="btn-final" class="btn-final">GO TO DESTINATION</a>

    <script>
        let time = 10;
        let x = setInterval(() => {
            time--;
            document.getElementById('timer').innerHTML = time;
            if(time <= 0) {
                clearInterval(x);
                document.getElementById('timer').style.display = 'none';
                document.getElementById('btn-final').style.display = 'inline-block';
            }
        }, 1000);
    </script>
</body>
</html>
