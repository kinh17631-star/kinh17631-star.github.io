<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Verification | PhoneInfo Pro</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #2f81f7; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
        
        .ad-container { 
            width: 320px; 
            min-height: 250px; 
            background: var(--card); 
            border: 1px dashed #30363d; 
            margin: 20px auto; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
        }

        #timer-box { margin: 40px 0; }
        #timer { font-size: 80px; color: var(--accent); font-weight: bold; }
        
        .btn-next { 
            display: none; 
            background: #238636; 
            color: white; 
            padding: 18px 50px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(35, 134, 54, 0.3);
        }

        .info-text { color: #8b949e; font-size: 0.9rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <p class="info-text">Sponsored Content</p>
    <div class="ad-container">
        <p style="color:#484f58;">Ad Loading...</p>
    </div>

    <div id="timer-box">
        <h3>Processing your request...</h3>
        <div id="timer">10</div>
    </div>

    <a href="commands.html" id="btn-next" class="btn-next">CONTINUE TO COMMANDS</a>

    <p class="info-text" style="margin-top: 40px;">Advertisement</p>
    <div class="ad-container">
        <p style="color:#484f58;">Ad Loading...</p>
    </div>

    <script>
        let timeLeft = 10;
        let timerElement = document.getElementById('timer');
        let nextButton = document.getElementById('btn-next');

        let countdown = setInterval(() => {
            timeLeft--;
            timerElement.innerText = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(countdown);
                document.getElementById('timer-box').style.display = 'none';
                nextButton.style.display = 'inline-block';
            }
        }, 1000);
    </script>

</body>
</html>
